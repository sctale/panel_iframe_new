<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>侧边栏面板</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* 加载动画 */
    .loader {
      margin: 0 auto 24px;
      font-size: 10px;
      position: relative;
      text-indent: -9999em;
      border-radius: 50%;
      width: 6em;
      height: 6em;
      border-top: 0.8em solid rgba(3, 169, 244, 0.2);
      border-right: 0.8em solid rgba(3, 169, 244, 0.2);
      border-bottom: 0.8em solid rgba(3, 169, 244, 0.2);
      border-left: 0.8em solid #03a9f4;
      animation: spin 1s infinite linear;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .info {
      text-align: center;
      color: #666;
    }

    .info a {
      color: #03a9f4;
      text-decoration: none;
    }

    .info a:hover {
      text-decoration: underline;
    }

    .host {
      font-size: 24px;
      font-weight: 500;
      color: #333;
      margin-top: 16px;
    }
  </style>
</head>

<body>
  <div class="info">
    <div class="loader">加载中...</div>
    <a id="link" target="_blank"></a>
    <div id="host" class="host"></div>
  </div>
  <script>
    (function () {
      if (!location.search) return;

      const query = new URLSearchParams(location.search);
      const url = decodeURIComponent(query.get('url') || '');
      const mode = query.get('mode');

      if (!url) return;

      // 显示链接信息
      const linkEl = document.getElementById('link');
      const hostEl = document.getElementById('host');
      linkEl.textContent = url;
      linkEl.href = url;

      if (url.startsWith('http')) {
        try {
          const uri = new URL(url);
          hostEl.textContent = uri.host;
          hostEl.onclick = () => window.open(uri.origin);
          hostEl.style.cursor = 'pointer';
        } catch (e) {
          // URL 解析失败，忽略
        }
      }

      // HTTPS 环境下 HTTP 链接，打开新标签页
      if (location.protocol === 'https:' && url.indexOf('http://') === 0) {
        window.open(url);
        return;
      }

      // 新页面模式，打开新标签页
      if (mode === '2') {
        window.open(url);
        return;
      }

      // 默认跳转
      location.href = url;
    })();
  </script>
</body>

</html>
